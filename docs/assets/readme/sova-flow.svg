<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">Sova MVP pipeline</title>
  <desc id="desc">Telegram sources are synced locally, classified by Qwen, summarized by Codex, published to Sova Nest, and calendar events are created only after approval.</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .title { fill: #1e2528; font: 700 42px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #526064; font: 500 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box { stroke: #253137; stroke-width: 2; rx: 18; }
      .box-title { fill: #172022; font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box-text { fill: #334044; font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { stroke: #253137; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .note { fill: #6a4d12; font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#253137" />
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="380" rx="28" />
  <text class="title" x="56" y="74">Sova</text>
  <text class="subtitle" x="56" y="105">Локальный конвейер учебной информации: от Telegram до обзора и календаря</text>

  <rect class="box" x="56" y="158" width="150" height="112" fill="#dff0ff" />
  <text class="box-title" x="80" y="195">Telegram</text>
  <text class="box-text" x="80" y="224">только allowlist</text>
  <text class="box-text" x="80" y="247">raw immutable</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M216 214 H272" />
  <rect class="box" x="286" y="158" width="150" height="112" fill="#e7f6df" />
  <text class="box-title" x="318" y="195">SQLite</text>
  <text class="box-text" x="318" y="224">local state</text>
  <text class="box-text" x="318" y="247">compact indexes</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M446 214 H502" />
  <rect class="box" x="516" y="158" width="150" height="112" fill="#fff1c8" />
  <text class="box-title" x="553" y="195">Qwen</text>
  <text class="box-text" x="548" y="224">bounded batches</text>
  <text class="box-text" x="548" y="247">safe fallback</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M676 214 H732" />
  <rect class="box" x="746" y="158" width="150" height="112" fill="#efe7ff" />
  <text class="box-title" x="785" y="195">Codex</text>
  <text class="box-text" x="779" y="224">compact bundle</text>
  <text class="box-text" x="779" y="247">digest writer</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M906 214 H962" />
  <rect class="box" x="976" y="158" width="168" height="112" fill="#ffe0df" />
  <text class="box-title" x="1012" y="195">Sova Nest</text>
  <text class="box-text" x="1012" y="224">Digest topic</text>
  <text class="box-text" x="1012" y="247">approval flow</text>

  <path class="arrow" marker-end="url(#arrowhead)" d="M1060 281 C1060 332 827 335 827 286" />
  <text class="note" x="707" y="332">Google Calendar: только после approve в Calendar topic</text>
</svg>
